version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: movie_db_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moviedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: movie_db_backend
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/moviedb
      PORT: 4000
    depends_on:
      - postgres
    ports:
      - "4000:4000"
      - "5555:5555"
    env_file:
      - ./backend/.env  

  frontend:
    build: ./frontend
    container_name: movie-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    env_file:
      - ./frontend/.env

volumes:
  postgres_data:
