# k8s/postgres.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:16

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

        env:
        - name: POSTGRES_USER
          value: postgres

        - name: POSTGRES_PASSWORD
          value: postgres

        - name: POSTGRES_DB
          value: moviedb

        ports:
        - containerPort: 5432

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc  